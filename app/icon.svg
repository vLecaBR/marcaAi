<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="marcaaiGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6" />
      <stop offset="100%" stop-color="#6d28d9" />
    </linearGradient>
    <linearGradient id="checkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#e2e8f0" />
    </linearGradient>
  </defs>
  
  <!-- Fundo Arredondado -->
  <rect width="512" height="512" rx="120" fill="url(#marcaaiGrad)" />
  
  <!-- Letra M Estilizada -->
  <path d="M140 360 V180 L256 280 L372 180 V360" 
        fill="none" 
        stroke="rgba(255,255,255,0.2)" 
        stroke-width="48" 
        stroke-linecap="round" 
        stroke-linejoin="round" />
        
  <!-- Checkmark (O "Aí" / Confirmação) -->
  <path d="M210 270 L245 305 L330 200" 
        fill="none" 
        stroke="url(#checkGrad)" 
        stroke-width="44" 
        stroke-linecap="round" 
        stroke-linejoin="round" />
</svg>